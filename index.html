<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

 <!-- Descripción -->

<title>🎁 Feliz cumpleaños</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.75)),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1973&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

    overflow-x:hidden;
    overflow-y:auto;

    padding:40px 20px;
}

/* MAR */

.ocean{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.wave{
    position:absolute;

    width:200%;
    height:220px;

    background:rgba(255,255,255,.08);

    border-radius:45%;

    bottom:-120px;

    animation:wave 12s linear infinite;
}

.wave:nth-child(2){
    bottom:-140px;
    opacity:.5;
    animation-duration:16s;
}

.wave:nth-child(3){
    bottom:-160px;
    opacity:.3;
    animation-duration:20s;
}

@keyframes wave{

    from{
        transform:translateX(0) rotate(0deg);
    }

    to{
        transform:translateX(-50%) rotate(360deg);
    }

}

/* PARTICULAS */

.particle{

    position:fixed;

    color:white;

    pointer-events:none;

    animation:floatUp linear forwards;

    z-index:1;
}

@keyframes floatUp{

    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh) scale(1.4) rotate(360deg);
        opacity:0;
    }

}

/* CONTENEDOR */

.container{

    position:relative;

    z-index:2;

    width:100%;
    max-width:1100px;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */

.card{

    position:relative;

    overflow:hidden;

    width:100%;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(16px);

    border-radius:40px;

    padding:60px 40px;

    box-shadow:
    0 0 80px rgba(255,255,255,.08),
    0 30px 100px rgba(0,0,0,.6);
}

/* GLOW */

.card::before{

    content:'';

    position:absolute;

    width:500px;
    height:500px;

    background:
    radial-gradient(circle,#ff980055,transparent 70%);

    top:-250px;
    right:-180px;

    animation:pulse 5s infinite;
}

@keyframes pulse{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

}

/* LOGO */

.logo{

    text-align:center;

    font-size:5rem;

    margin-bottom:10px;

    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

}

/* TITULO */

.title{

    text-align:center;

    color:white;

    font-size:4rem;

    font-weight:800;

    margin-bottom:10px;

    line-height:1.1;

    text-shadow:
    0 0 15px rgba(255,255,255,.7),
    0 0 45px rgba(255,0,106,.5);
}

/* TEXTO */

.subtitle{

    text-align:center;

    color:#f1f1f1;

    line-height:2;

    max-width:850px;

    margin:auto;

    font-size:1.05rem;
}

.quote{

    text-align:center;

    margin-top:25px;

    color:#ffe082;

    font-weight:700;

    font-size:1.2rem;

    animation:shine 2s infinite alternate;
}

@keyframes shine{

    from{
        opacity:.7;
    }

    to{
        opacity:1;
        text-shadow:0 0 15px #ffe082;
    }

}

/* RULETA */

.wheel-wrapper{

    margin-top:45px;

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    padding:40px 0;
}

/* FLECHA */

.pointer{

    width:0;
    height:0;

    border-left:25px solid transparent;
    border-right:25px solid transparent;
    border-top:45px solid #fff;

    z-index:10;

    filter:drop-shadow(0 0 15px white);

    margin-bottom:10px;
}

/* GLOW RULETA */

.wheel-glow{

    position:absolute;

    width:min(430px, 90vw);
    height:min(430px, 90vw);

    border-radius:50%;

    background:
    conic-gradient(
        #ff9800,
        #ff006a,
        #6200ff,
        #00e5ff,
        #ff9800
    );

    filter:blur(25px);

    opacity:.8;

    animation:rotateGlow 6s linear infinite;
}

@keyframes rotateGlow{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}

/* RUEDA */

.wheel,
.wheel-glow{
    max-width:100%;
}

.wheel{

    position:relative;

    width:min(380px, 75vw);
    height:min(380px, 75vw);

    border-radius:50%;

    border:12px solid white;

    overflow:hidden;

    transition:6s cubic-bezier(.17,.67,.18,.99);

    box-shadow:
    0 0 40px rgba(255,255,255,.4),
    inset 0 0 30px rgba(255,255,255,.25);

    z-index:2;
}

/* SECCIONES */

.slice{

    position:absolute;

    width:50%;
    height:50%;

    transform-origin:100% 100%;
}

.slice1{
    background:linear-gradient(45deg,#ff9800,#ffcc00);
    transform:rotate(0deg) skewY(-30deg);
}

.slice2{
    background:linear-gradient(45deg,#ff006a,#ff4081);
    transform:rotate(120deg) skewY(-30deg);
}

.slice3{
    background:linear-gradient(45deg,#6200ff,#7c4dff);
    transform:rotate(240deg) skewY(-30deg);
}

/* CENTRO */

.center{

    position:absolute;

    width:100px;
    height:100px;

    background:white;

    border-radius:50%;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:5;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:2.5rem;

    box-shadow:
    0 0 25px rgba(255,255,255,.8);
}

/* BOTON */

.btn{

    margin-top:40px;

    padding:18px 45px;

    border:none;

    border-radius:60px;

    font-size:1rem;

    font-weight:700;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
        45deg,
        #ff9800,
        #ff006a,
        #6200ff
    );

    background-size:300% 300%;

    animation:gradientMove 5s ease infinite;

    box-shadow:
    0 0 30px rgba(255,0,106,.5),
    0 10px 40px rgba(0,0,0,.5);

    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

/* RESULTADO */

.result{

    margin-top:40px;

    background:rgba(255,255,255,.1);

    border:1px solid rgba(255,255,255,.15);

    border-radius:35px;

    padding:35px;

    text-align:center;

    color:white;

    opacity:0;

    transform:translateY(20px) scale(.8);

    transition:.8s;
}

.result.show{

    opacity:1;

    transform:translateY(0) scale(1);
}

.result h2{

    font-size:2.7rem;

    margin-bottom:15px;

    color:#ffe082;

    text-shadow:
    0 0 15px rgba(255,224,130,.8);
}

.result p{

    max-width:700px;

    margin:auto;

    line-height:2;

    font-size:1.05rem;
}

/* CONFETTI */

.confetti{

    position:fixed;

    width:12px;
    height:12px;

    top:-20px;

    z-index:999;

    animation:fall linear forwards;
}

@keyframes fall{

    to{
        transform:translateY(120vh) rotate(720deg);
    }

}

/* RESPONSIVE */

@media(max-width:768px){

    body{

        padding:20px 12px;

        align-items:flex-start;
    }

    .container{
        width:100%;
    }

    .card{

        padding:30px 16px;

        border-radius:28px;

        margin:20px 0;
    }

    .card::before{

        width:250px;
        height:250px;

        top:-120px;
        right:-100px;
    }

    .logo{

        font-size:3rem;

        margin-bottom:5px;
    }

    .title{

        font-size:2rem;

        line-height:1.2;

        margin-bottom:15px;
    }

    .subtitle{

        font-size:.92rem;

        line-height:1.7;
    }

    .quote{

        font-size:1rem;

        margin-top:18px;

        line-height:1.5;
    }

    .wheel-wrapper{

        margin-top:25px;

        padding:20px 0;
    }

    .pointer{

        border-left:18px solid transparent;
        border-right:18px solid transparent;
        border-top:32px solid #fff;

        margin-bottom:8px;
    }

    .wheel{

        width:260px;
        height:260px;

        border:8px solid white;
    }

    .wheel-glow{

        width:290px;
        height:290px;

        filter:blur(18px);
    }

    .center{

        width:65px;
        height:65px;

        font-size:1.6rem;
    }

    .btn{

        width:100%;

        margin-top:28px;

        padding:15px 20px;

        font-size:.95rem;

        border-radius:18px;
    }

    .result{

        margin-top:25px;

        padding:22px 18px;

        border-radius:22px;
    }

    .result h2{

        font-size:1.5rem;

        line-height:1.3;
    }

    .result p{

        font-size:.92rem;

        line-height:1.7;
    }

    .wave{

        height:150px;
    }

}

</style>

</head>

<body>

<!-- OLAS -->

<div class="ocean">

    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>

</div>

<div class="container">

<div class="card">

<div class="logo">
🏴‍☠️
</div>

<h1 class="title">
Feliz Cumpleaños Dianita ✨
</h1>

<p class="subtitle">
Que este nuevo año de vida esté lleno de aventuras, sonrisas y sueños cumplidos 🌸✨.
Hoy el mundo celebra a una persona increíble, así que disfruta cada momento y nunca dejes de brillar 🏴‍☠️✨
</p>

<div class="quote">
⚓ “Nunca dejes de seguir tus sueños.” ⚓
</div>

<!-- RULETA -->

<div class="wheel-wrapper">

<div class="pointer"></div>

<div class="wheel-glow"></div>

<div class="wheel" id="wheel">

<div class="slice slice1"></div>
<div class="slice slice2"></div>
<div class="slice slice3"></div>

<div class="center">
🎁
</div>

</div>

<button class="btn" onclick="spinWheel()">
✨ DESCUBRIR TESORO ✨
</button>

</div>

<!-- RESULTADO -->

<div class="result" id="result"></div>

</div>

</div>

<script>

/* PARTICULAS */

setInterval(()=>{

    const particle = document.createElement('div');

    particle.classList.add('particle');

    particle.innerHTML =
    ['✨','⭐','💖','🌸','☠️']
    [Math.floor(Math.random()*5)];

    particle.style.left =
    Math.random()*100+'vw';

    particle.style.fontSize =
    (Math.random()*20+15)+'px';

    particle.style.animationDuration =
    (Math.random()*5+4)+'s';

    document.body.appendChild(particle);

    setTimeout(()=>{
        particle.remove();
    },9000);

},250);

/* CONFETTI */

function confetti(){

    for(let i=0;i<150;i++){

        const c = document.createElement('div');

        c.classList.add('confetti');

        c.style.left =
        Math.random()*100+'vw';

        c.style.background =
        ['#ff9800','#ff006a','#6200ff','#00e5ff','#ffffff']
        [Math.floor(Math.random()*5)];

        c.style.animationDuration =
        (Math.random()*3+2)+'s';

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);

    }

}

/* RULETA */

const wheel =
document.getElementById('wheel');

const result =
document.getElementById('result');

let spinning = false;

function spinWheel(){

    if(spinning) return;

    spinning = true;

    result.classList.remove('show');

    /*
    Parece aleatorio
    pero SIEMPRE cae en maestría
    */

    const turns =
    Math.floor(Math.random()*5)+8;

    const rotation =
    (360 * turns) + 15;

    wheel.style.transform =
    `rotate(${rotation}deg)`;

    setTimeout(()=>{

        confetti();

        result.innerHTML = `

        <h2>
        🎓 ¡TU REGALO ES LA MAESTRÍA! ✨
        </h2>

        <p>
            Porque eres una persona increíble, inteligente y llena de sueños enormes 🌸✨.
            Este regalo simboliza una nueva aventura, crecimiento, metas cumplidas y un futuro brillante.
            Que cada paso que des te acerque más a todo lo que deseas,
            y que nunca dejes de creer en ti ✨💖
        </p>

        `;

        result.classList.add('show');

        spinning = false;

    },6000);

}

</script>

</body>
</html>
